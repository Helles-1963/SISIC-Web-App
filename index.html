<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SISIC Agent Web-App</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">

  <style>
    body {
      margin:0;
      font-family:Segoe UI,Arial,sans-serif;
      background:#f4f8f9;
      color:#102a2e;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    h1 { margin:0 0 10px; }

    .card {
      background:white;
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);
    }

    textarea, input {
      width:100%;
      padding:12px;
      margin-top:5px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    textarea::placeholder {
      opacity:0.5;
      font-style:italic;
    }

    button {
      padding:12px 16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-primary { background:#007c86; color:white; }
    .btn-secondary { background:#eaeaea; }

    .result-box {
      margin-top:10px;
      font-size:18px;
    }

    .big {
      font-size:36px;
      font-weight:bold;
      margin-bottom:5px;
    }

    .confidence-bar {
      height:10px;
      background:#ddd;
      border-radius:8px;
      overflow:hidden;
    }

    .confidence-bar span {
      display:block;
      height:100%;
      background:#007c86;
    }

    .badge {
      display:inline-block;
      padding:6px 10px;
      border-radius:20px;
      font-size:12px;
      margin-top:5px;
      background:#e0f3f5;
    }

    .alt {
      background:#eef8fb;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h1>SISIC Agent Web-App</h1>
    <div id="status">✅ Daten geladen</div>
  </div>

  <div class="card">
    <h2>Eingabe</h2>

    <label>Projektname</label>
    <textarea id="projectName" placeholder="z. B. Neubau Data Center Frankfurt"></textarea>

    <label>Endkunde</label>
    <input id="endCustomer" placeholder="z. B. Hirschvogel, Uni-Klinik Mainz">

    <label>Auftraggeber</label>
    <input id="contractingParty" placeholder="optional">

    <button class="btn-primary" onclick="run()">SISIC berechnen</button>
    <button class="btn-secondary" onclick="demo()">Demo</button>
    <button class="btn-secondary" onclick="resetAll()">Reset</button>

  </div>

  <div class="card">
    <h2>Ergebnis</h2>

    <div class="big" id="sisic">—</div>
    <div id="vertical">—</div>

    <div style="margin-top:10px">
      Confidence: <span id="confidence">0.00</span>
      <div class="confidence-bar">
        <span id="bar" style="width:0%"></span>
      </div>
      <div class="badge" id="label">KEIN TREFFER</div>
    </div>

    <div class="result-box">
      <strong>Begründung:</strong>
      <div id="reason">—</div>
    </div>

    <div class="result-box">
      <strong>Alternativen:</strong>
      <div id="alts"></div>
    </div>

  </div>

</div>

<!-- Wichtig: Reihenfolge -->
<script src="data.js"></script>
<script src="engine.js"></script>

<script>

function checkSystem() {
  if (!window.SISIC_DATA) {
    document.getElementById("status").textContent = "❌ data.js nicht geladen";
    console.error("SISIC_DATA fehlt!");
  } else if (!window.SISICEngine) {
    document.getElementById("status").textContent = "❌ engine.js nicht geladen";
    console.error("Engine fehlt!");
  } else {
    document.getElementById("status").textContent =
      "✅ Daten geladen | Keywords: " + SISIC_DATA.keywords.length +
      " | Aliases: " + SISIC_DATA.aliases.length;
  }
}

function run() {
  const p = document.getElementById("projectName").value;
  const c = document.getElementById("endCustomer").value;
  const cp = document.getElementById("contractingParty").value;

  const r = SISICEngine.computeRow(p,c,cp);

  document.getElementById("sisic").textContent = r.sisic || "—";
  document.getElementById("vertical").textContent = r.vertical || "—";

  document.getElementById("confidence").textContent = r.confidence.toFixed(2);
  document.getElementById("bar").style.width = (r.confidence * 100) + "%";
  document.getElementById("label").textContent = r.label;

  document.getElementById("reason").textContent = r.reason || "—";

  let altHTML = "";
  if (r.alt1Code) {
    altHTML += `<div class="alt">${r.alt1Code} – ${r.alt1Reason}</div>`;
  }
  if (r.alt2Code) {
    altHTML += `<div class="alt">${r.alt2Code} – ${r.alt2Reason}</div>`;
  }

  document.getElementById("alts").innerHTML =
    altHTML || "Keine Alternativen";
}

function demo() {
  document.getElementById("projectName").value = "Werkserweiterung Halbleiterproduktion";
  document.getElementById("endCustomer").value = "Chip AG";
  run();
}

function resetAll() {
  document.getElementById("projectName").value = "";
  document.getElementById("endCustomer").value = "";
  document.getElementById("contractingParty").value = "";
}

checkSystem();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

</script>

</body>
</html>
